name: Build Minimal FFmpeg

on:
  workflow_dispatch:  # Manual trigger

jobs:
  build-ffmpeg:
    strategy:
      fail-fast: false
      matrix:
        include:
          # hw_flags: per-platform hardware H.264 encoder configure flags.
          # nvcodec/amf/libvpl toggle the matching pre-configure dependency
          # steps below (mediafoundation/videotoolbox need no external deps).
          # extra_libs_hw: extra linker libs the hardware deps pull in (libvpl
          # is C++, so it needs libstdc++).
          - os: macos-15-intel
            platform: darwin_amd64
            arch: x86_64
            hw_flags: >-
              --enable-videotoolbox
              --enable-encoder=h264_videotoolbox
          - os: macos-15
            platform: darwin_arm64
            arch: arm64
            hw_flags: >-
              --enable-videotoolbox
              --enable-encoder=h264_videotoolbox
          - os: ubuntu-24.04
            platform: linux_amd64
            arch: x86_64
            nvcodec: true
            amf: true
            libvpl: true
            extra_libs_hw: "-lstdc++"
            hw_flags: >-
              --enable-ffnvcodec
              --enable-encoder=h264_nvenc
              --enable-amf
              --enable-encoder=h264_amf
              --enable-libvpl
              --enable-encoder=h264_qsv
          - os: ubuntu-24.04-arm
            platform: linux_arm64
            arch: aarch64
            nvcodec: true
            hw_flags: >-
              --enable-ffnvcodec
              --enable-encoder=h264_nvenc
          - os: windows-2025
            platform: windows_amd64
            arch: x86_64
            nvcodec: true
            amf: true
            libvpl: true
            extra_libs_hw: "-lstdc++"
            hw_flags: >-
              --enable-ffnvcodec
              --enable-encoder=h264_nvenc
              --enable-amf
              --enable-encoder=h264_amf
              --enable-libvpl
              --enable-encoder=h264_qsv
              --enable-mediafoundation
              --enable-encoder=h264_mf
    
    runs-on: ${{ matrix.os }}
    env:
      FFMPEG_CONFIGURE_FLAGS: >-
        --pkg-config-flags="--static"
        --enable-gpl
        --enable-libx264
        --enable-static
        --disable-everything
        --enable-protocol=file
        --enable-protocol=pipe
        --enable-demuxer=flv
        --enable-demuxer=live_flv
        --enable-demuxer=mpegts
        --enable-demuxer=mov
        --enable-demuxer=mp4
        --enable-demuxer=hls
        --enable-demuxer=concat
        --enable-muxer=mp4
        --enable-muxer=mpegts
        --enable-decoder=h264
        --enable-decoder=hevc
        --enable-decoder=aac
        --enable-decoder=mp3
        --enable-encoder=libx264
        --enable-encoder=aac
        --enable-parser=h264
        --enable-parser=hevc
        --enable-parser=aac
        --enable-parser=mpegaudio
        --enable-bsf=h264_mp4toannexb
        --enable-bsf=hevc_mp4toannexb
        --enable-bsf=aac_adtstoasc
        --enable-filter=null
        --enable-filter=anull
        --enable-encoder=mjpeg
        --enable-muxer=image2
        --enable-filter=scale,format
        --enable-swscale
        --enable-swresample
        --enable-indev=lavfi
        --enable-muxer=null
        --enable-filter=pad,setsar,aresample,aformat,concat,testsrc
        --enable-decoder=wrapped_avframe
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install build dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            yasm \
            nasm \
            pkg-config \
            cmake \
            git
      
      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install yasm nasm pkg-config
      
      - name: Install build dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Install MSYS2 for Unix-like build environment
          choco install -y msys2
          
          # Update MSYS2 and install required packages including nasm
          C:\tools\msys64\usr\bin\bash.exe -lc "pacman -Syu --noconfirm"
          C:\tools\msys64\usr\bin\bash.exe -lc "pacman -S --noconfirm base-devel mingw-w64-x86_64-toolchain nasm git mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja"
      
      - name: Get latest FFmpeg release
        id: ffmpeg-version
        shell: bash
        run: |
          # Fetch the latest stable release tag from FFmpeg repository
          LATEST_TAG=$(git ls-remote --tags --refs --sort='v:refname' https://github.com/FFmpeg/FFmpeg.git | grep -E 'refs/tags/n[0-9]+\.[0-9]+(\.[0-9]+)?$' | tail -n1 | sed 's/.*\///')
          echo "Latest FFmpeg tag: $LATEST_TAG"
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          
          # Extract version for cache key (e.g., n7.1 -> 7.1)
          VERSION=$(echo "$LATEST_TAG" | sed 's/^n//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Cache FFmpeg source
        id: cache-ffmpeg-source
        uses: actions/cache@v4
        with:
          path: ffmpeg-source
          key: ffmpeg-source-${{ steps.ffmpeg-version.outputs.version }}-${{ runner.os }}
      
      - name: Download FFmpeg source
        if: steps.cache-ffmpeg-source.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone --depth 1 --branch ${{ steps.ffmpeg-version.outputs.tag }} https://github.com/FFmpeg/FFmpeg.git ffmpeg-source
      
      - name: Verify FFmpeg source exists
        shell: bash
        run: |
          if [ ! -d "ffmpeg-source" ]; then
            echo "ERROR: ffmpeg-source directory not found!"
            echo "Current directory: $(pwd)"
            echo "Contents:"
            ls -la
            exit 1
          fi
          echo "ffmpeg-source directory found"
      
      - name: Cache x264 source
        id: cache-x264-source
        uses: actions/cache@v4
        with:
          path: x264-source
          key: x264-source-${{ runner.os }}-${{ matrix.arch }}
      
      - name: Download x264 source
        if: steps.cache-x264-source.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone --depth 1 https://code.videolan.org/videolan/x264.git x264-source
      
      - name: Verify x264 source exists
        shell: bash
        run: |
          if [ ! -d "x264-source" ]; then
            echo "ERROR: x264-source directory not found!"
            echo "Current directory: $(pwd)"
            echo "Contents:"
            ls -la
            exit 1
          fi
          echo "x264-source directory found"
      
      - name: Build libx264 (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          # Use absolute path for prefix
          BUILD_PREFIX="$(cd .. && pwd)/ffmpeg-build"
          cd x264-source
          
          ./configure --prefix="$BUILD_PREFIX" \
            --enable-static \
            --enable-pic \
            --disable-shared \
            --disable-cli
          
          make clean
          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2)
          make install
          
          # Verify installation
          echo "=== Checking x264 installation ==="
          ls -la "$BUILD_PREFIX/lib/" || true
          ls -la "$BUILD_PREFIX/lib/pkgconfig/" || true
          cat "$BUILD_PREFIX/lib/pkgconfig/x264.pc" || true
      
      - name: Build libx264 (Windows)
        if: runner.os == 'Windows'
        shell: C:\tools\msys64\usr\bin\bash.exe -leo pipefail {0}
        env:
          MSYSTEM: MINGW64
          CHERE_INVOKING: 1
        run: |
          # Use GitHub Actions workspace path
          cd "$GITHUB_WORKSPACE"
          echo "Working directory: $(pwd)"
          
          # Use absolute path for prefix
          BUILD_PREFIX="$(cd .. && pwd)/ffmpeg-build"
          
          # Navigate to x264 source
          cd x264-source
          
          ./configure --prefix="$BUILD_PREFIX" \
            --enable-static \
            --enable-pic \
            --disable-shared \
            --disable-cli
          
          make -j$(nproc)
          make install
          
          # Verify installation
          echo "=== Checking x264 installation ==="
          ls -la "$BUILD_PREFIX/lib/" || true
          ls -la "$BUILD_PREFIX/lib/pkgconfig/" || true
          cat "$BUILD_PREFIX/lib/pkgconfig/x264.pc" || true

      # --- Hardware-encoder dependencies (header/lib only; the encoders
      # themselves dlopen the vendor runtime at execution time, so a build
      # host without the GPU still produces a working binary). ---

      - name: Build nv-codec-headers (Unix)
        if: runner.os != 'Windows' && matrix.nvcodec
        shell: bash
        run: |
          BUILD_PREFIX="$(cd .. && pwd)/ffmpeg-build"
          git clone --depth 1 https://github.com/FFmpeg/nv-codec-headers.git nv-codec-headers
          make -C nv-codec-headers PREFIX="$BUILD_PREFIX" install
          cat "$BUILD_PREFIX/lib/pkgconfig/ffnvcodec.pc" || true

      - name: Build nv-codec-headers (Windows)
        if: runner.os == 'Windows' && matrix.nvcodec
        shell: C:\tools\msys64\usr\bin\bash.exe -leo pipefail {0}
        env:
          MSYSTEM: MINGW64
          CHERE_INVOKING: 1
        run: |
          cd "$GITHUB_WORKSPACE"
          BUILD_PREFIX="$(cd .. && pwd)/ffmpeg-build"
          git clone --depth 1 https://github.com/FFmpeg/nv-codec-headers.git nv-codec-headers
          make -C nv-codec-headers PREFIX="$BUILD_PREFIX" install
          cat "$BUILD_PREFIX/lib/pkgconfig/ffnvcodec.pc" || true

      - name: Install AMF headers (Unix)
        if: runner.os != 'Windows' && matrix.amf
        shell: bash
        run: |
          BUILD_PREFIX="$(cd .. && pwd)/ffmpeg-build"
          git clone --depth 1 https://github.com/GPUOpen-LibrariesAndSDKs/AMF.git amf-source
          mkdir -p "$BUILD_PREFIX/include/AMF"
          cp -r amf-source/amf/public/include/* "$BUILD_PREFIX/include/AMF/"
          ls "$BUILD_PREFIX/include/AMF/core/Version.h"

      - name: Install AMF headers (Windows)
        if: runner.os == 'Windows' && matrix.amf
        shell: C:\tools\msys64\usr\bin\bash.exe -leo pipefail {0}
        env:
          MSYSTEM: MINGW64
          CHERE_INVOKING: 1
        run: |
          cd "$GITHUB_WORKSPACE"
          BUILD_PREFIX="$(cd .. && pwd)/ffmpeg-build"
          git clone --depth 1 https://github.com/GPUOpen-LibrariesAndSDKs/AMF.git amf-source
          mkdir -p "$BUILD_PREFIX/include/AMF"
          cp -r amf-source/amf/public/include/* "$BUILD_PREFIX/include/AMF/"
          ls "$BUILD_PREFIX/include/AMF/core/Version.h"

      - name: Build libvpl (Unix)
        if: runner.os != 'Windows' && matrix.libvpl
        shell: bash
        run: |
          BUILD_PREFIX="$(cd .. && pwd)/ffmpeg-build"
          git clone --depth 1 --branch v2.13.0 https://github.com/intel/libvpl.git libvpl-source
          cd libvpl-source
          cmake -B build \
            -DCMAKE_INSTALL_PREFIX="$BUILD_PREFIX" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DINSTALL_EXAMPLE_CODE=OFF
          cmake --build build --config Release -j
          cmake --install build
          cat "$BUILD_PREFIX/lib/pkgconfig/vpl.pc" || true

      - name: Build libvpl (Windows)
        if: runner.os == 'Windows' && matrix.libvpl
        shell: C:\tools\msys64\usr\bin\bash.exe -leo pipefail {0}
        env:
          MSYSTEM: MINGW64
          CHERE_INVOKING: 1
        run: |
          cd "$GITHUB_WORKSPACE"
          BUILD_PREFIX="$(cd .. && pwd)/ffmpeg-build"
          git clone --depth 1 --branch v2.13.0 https://github.com/intel/libvpl.git libvpl-source
          cd libvpl-source
          cmake -G Ninja -B build \
            -DCMAKE_INSTALL_PREFIX="$BUILD_PREFIX" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DINSTALL_EXAMPLE_CODE=OFF
          cmake --build build -j
          cmake --install build
          cat "$BUILD_PREFIX/lib/pkgconfig/vpl.pc" || true

      - name: Configure minimal FFmpeg (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          # Use absolute paths
          BUILD_PREFIX="$(cd .. && pwd)/ffmpeg-build"
          cd ffmpeg-source
          
          # Clean any previous build artifacts from cached source
          make distclean 2>/dev/null || true
          
          PKG_CONFIG_PATH="$BUILD_PREFIX/lib/pkgconfig" \
          ./configure \
            --prefix="$BUILD_PREFIX" \
            --extra-cflags="-I$BUILD_PREFIX/include" \
            --extra-ldflags="-L$BUILD_PREFIX/lib" \
            ${{ env.FFMPEG_CONFIGURE_FLAGS }} \
            ${{ matrix.hw_flags }} \
            --extra-libs="-lpthread -lm -ldl ${{ matrix.extra_libs_hw }}"
      
      - name: Configure minimal FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: C:\tools\msys64\usr\bin\bash.exe -leo pipefail {0}
        env:
          MSYSTEM: MINGW64
          CHERE_INVOKING: 1
        run: |
          # Use GitHub Actions workspace path
          cd "$GITHUB_WORKSPACE"
          echo "Working directory: $(pwd)"
          
          # Use absolute paths
          BUILD_PREFIX="$(cd .. && pwd)/ffmpeg-build"
          
          # Navigate to ffmpeg source
          cd ffmpeg-source
          
          # Clean any previous build artifacts from cached source
          make distclean 2>/dev/null || true
          
          # -static forces MinGW to link winpthread, iconv, zlib and libgcc
          # from their .a archives instead of DLLs, producing a fully
          # self-contained ffmpeg.exe (no libwinpthread-1.dll / libiconv-2.dll
          # / zlib1.dll at runtime, which would otherwise fail with 0xc0000135).
          PKG_CONFIG_PATH="$BUILD_PREFIX/lib/pkgconfig" \
          ./configure \
            --prefix="$BUILD_PREFIX" \
            --extra-cflags="-I$BUILD_PREFIX/include" \
            --extra-ldflags="-L$BUILD_PREFIX/lib -static" \
            ${{ env.FFMPEG_CONFIGURE_FLAGS }} \
            ${{ matrix.hw_flags }} \
            --extra-libs="-lpthread -lm ${{ matrix.extra_libs_hw }}"
      
      - name: Build FFmpeg (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd ffmpeg-source
          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2)
          make install
      
      - name: Build FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: C:\tools\msys64\usr\bin\bash.exe -leo pipefail {0}
        env:
          MSYSTEM: MINGW64
          CHERE_INVOKING: 1
        run: |
          # Use GitHub Actions workspace path
          cd "$GITHUB_WORKSPACE/ffmpeg-source"
          make -j$(nproc)
          make install
      
      - name: Strip binaries (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BUILD_PREFIX="$(cd .. && pwd)/ffmpeg-build"
          strip "$BUILD_PREFIX/bin/ffmpeg"
          strip "$BUILD_PREFIX/bin/ffprobe"

      - name: Strip binaries (Windows)
        if: runner.os == 'Windows'
        shell: C:\tools\msys64\usr\bin\bash.exe -leo pipefail {0}
        env:
          MSYSTEM: MINGW64
          CHERE_INVOKING: 1
        run: |
          cd "$GITHUB_WORKSPACE"
          BUILD_PREFIX="$(cd .. && pwd)/ffmpeg-build"
          strip "$BUILD_PREFIX/bin/ffmpeg.exe"
          strip "$BUILD_PREFIX/bin/ffprobe.exe"

      - name: Display binary sizes, encoders and test
        shell: bash
        run: |
          BUILD_PREFIX="$(cd .. && pwd)/ffmpeg-build"
          EXT=""
          if [ "${{ runner.os }}" = "Windows" ]; then EXT=".exe"; fi
          echo "=== Binary Sizes ==="
          ls -lh "$BUILD_PREFIX/bin/ffmpeg$EXT" "$BUILD_PREFIX/bin/ffprobe$EXT"
          echo ""
          echo "=== ffmpeg version ==="
          "$BUILD_PREFIX/bin/ffmpeg$EXT" -version || true
          echo ""
          echo "=== ffprobe version ==="
          "$BUILD_PREFIX/bin/ffprobe$EXT" -version || true
          echo ""
          echo "=== H.264 encoders present ==="
          "$BUILD_PREFIX/bin/ffmpeg$EXT" -hide_banner -encoders 2>/dev/null | grep -Ei 'h264|264' || true

      # Runs the recorder's exact merge-path commands with the software
      # encoder (CI runners have no GPU). Both MUST succeed — a build that
      # passes -version but fails these would break every merge at runtime
      # (e.g. the lavfi self-test needs the wrapped_avframe decoder, which
      # --disable-everything silently drops).
      - name: Smoke-test merge path
        shell: bash
        run: |
          BUILD_PREFIX="$(cd .. && pwd)/ffmpeg-build"
          EXT=""
          if [ "${{ runner.os }}" = "Windows" ]; then EXT=".exe"; fi
          FF="$BUILD_PREFIX/bin/ffmpeg$EXT"

          echo "=== encoder self-test (lavfi testsrc -> libx264 -> null) ==="
          "$FF" -hide_banner -loglevel error \
            -f lavfi -i "testsrc=size=1920x1080:rate=30:duration=1" \
            -c:v libx264 -preset medium -crf 20 -pix_fmt yuv420p -f null -

          echo "=== mixed-resolution concat graph (scale/pad/setsar/format/concat) ==="
          "$FF" -hide_banner -loglevel error \
            -f lavfi -i "testsrc=size=640x360:rate=30:duration=1" \
            -f lavfi -i "testsrc=size=320x240:rate=30:duration=1" \
            -filter_complex "[0:v]scale=640:360:force_original_aspect_ratio=decrease,pad=640:360:(ow-iw)/2:(oh-ih)/2:color=black,setsar=1,format=yuv420p[v0];[1:v]scale=640:360:force_original_aspect_ratio=decrease,pad=640:360:(ow-iw)/2:(oh-ih)/2:color=black,setsar=1,format=yuv420p[v1];[v0][v1]concat=n=2:v=1:a=0[outv]" \
            -map "[outv]" -c:v libx264 -preset ultrafast -crf 30 -f null -

          echo "Merge-path smoke test passed"

      - name: Package binaries
        shell: bash
        run: |
          BUILD_PREFIX="$(cd .. && pwd)/ffmpeg-build"
          mkdir -p release/${{ matrix.platform }}
          EXT=""
          if [ "${{ runner.os }}" = "Windows" ]; then EXT=".exe"; fi
          cp "$BUILD_PREFIX/bin/ffmpeg$EXT" release/${{ matrix.platform }}/
          cp "$BUILD_PREFIX/bin/ffprobe$EXT" release/${{ matrix.platform }}/
          cd release
          tar czf ffmpeg-${{ matrix.platform }}.tar.gz \
            ${{ matrix.platform }}/ffmpeg$EXT \
            ${{ matrix.platform }}/ffprobe$EXT
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-${{ matrix.platform }}
          path: release/ffmpeg-${{ matrix.platform }}.tar.gz
          retention-days: 90

  create-release:
    needs: build-ffmpeg
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f
      
      - name: Create release bundle
        run: |
          mkdir -p release-bundle
          cp artifacts/ffmpeg-*/ffmpeg-*.tar.gz release-bundle/
          cd release-bundle
          ls -lh
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ffmpeg-${{ github.run_number }}-${{ github.run_attempt }}
          name: FFmpeg Build ${{ github.run_number }}
          body: |
            Minimal FFmpeg + ffprobe builds for VodLabs Recorder.
            Each `ffmpeg-<platform>.tar.gz` contains both `ffmpeg` and
            `ffprobe` (H.264 hardware encoders where the platform supports
            them, libx264 fallback everywhere). Consumed by the recorder's
            `internal/ffmpeg/download.sh`.
          files: release-bundle/ffmpeg-*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
